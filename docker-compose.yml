version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: returnclaw-postgres
    environment:
      POSTGRES_USER: returnclaw
      POSTGRES_PASSWORD: returnclaw
      POSTGRES_DB: returnclaw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U returnclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: returnclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.gateway
    container_name: returnclaw-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://returnclaw:returnclaw@postgres:5432/returnclaw
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: returnclaw-web
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://gateway:3000
    depends_on:
      - gateway

volumes:
  postgres_data:
  redis_data:
